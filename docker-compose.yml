# Три микросервиса + PostgreSQL. Запуск: docker compose up --build
# С volume и --reload правки кода подхватываются без пересборки.
# urich монтируется из ../urich и ставится как -e (для разработки фреймворка без пуша в PyPI).
# Токен: POST http://localhost:8001/auth/login → Authorize на 8002 и 8003

services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - ../urich:/urich
    command: ["sh", "-c", "pip install -e /urich && uvicorn services.auth.main:app --host 0.0.0.0 --port 8000 --reload"]
    environment:
      DATABASE_URL: postgresql://urich:urich@postgres:5432/urichdemo
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      postgres:
        condition: service_healthy

  employees:
    build:
      context: .
      dockerfile: services/employees/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - .:/app
      - ../urich:/urich
    command: ["sh", "-c", "pip install -e /urich && uvicorn services.employees.main:app --host 0.0.0.0 --port 8000 --reload"]
    environment:
      DATABASE_URL: postgresql://urich:urich@postgres:5432/urichdemo
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      postgres:
        condition: service_healthy

  tasks:
    build:
      context: .
      dockerfile: services/tasks/Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - .:/app
      - ../urich:/urich
    command: ["sh", "-c", "pip install -e /urich && uvicorn services.tasks.main:app --host 0.0.0.0 --port 8000 --reload"]
    environment:
      DATABASE_URL: postgresql://urich:urich@postgres:5432/urichdemo
      JWT_SECRET: ${JWT_SECRET:-secret}
      EMPLOYEES_SERVICE_URL: http://employees:8000
    depends_on:
      postgres:
        condition: service_healthy
      employees:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - auth
      - employees
      - tasks

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: urich
      POSTGRES_PASSWORD: urich
      POSTGRES_DB: urichdemo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urich -d urichdemo"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
