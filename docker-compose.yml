services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://urich:urich@postgres:5432/urichdemo
      # Секрет для подписи JWT; если задан — включена авторизация по пользователям из БД
      JWT_SECRET: aboba
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: urich
      POSTGRES_PASSWORD: urich
      POSTGRES_DB: urichdemo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urich -d urichdemo"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
